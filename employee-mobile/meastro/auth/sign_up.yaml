tags:
  - auth
  - regression
---
- runFlow: ../setup/launch_app.yaml

# 1. Navigate to Sign Up
- tapOn: { id: "SIGNUP_BUTTON" }

# 2. Fill registration details with dynamic credentials
- tapOn: { id: "FIRST_NAME_INPUT" }
- inputText: "Maestro"
- tapOn: { id: "LAST_NAME_INPUT" }
- inputText: "Test"

# Generate a dynamic phone number using ${timestamp}
# This prevents 409 Conflict (User already exists) during multiple test runs
- tapOn: { id: "PHONE_NUMBER_INPUT" }
- inputText: "000000000"

- tapOn: { id: "PASSWORD_INPUT" }
- inputText: "Maestro@123"
- tapOn: { id: "CONFIRM_PASSWORD_INPUT" }
- inputText: "Maestro@123"

# 3. Submit Registration
- tapOn: { id: "CREATE_ACCOUNT_BUTTON" }

# 4. Verify Successful Redirection to Login
- assertVisible: "Please enter your details to sign in."
- assertVisible: { id: "SIGN_IN_BUTTON" }
