appId: ${APP_ID}
env:
  APP_ID: com.jyrwaboys.employeemobile.dev
---
- launchApp
- tapOn: "Sign up"
- assertVisible: "Create account"

# 1. Empty Form Validation
- tapOn: { id: "CREATE_ACCOUNT_BUTTON" }
- assertVisible: "First name is required"
- assertVisible: "Last name is required"
- assertVisible: "Phone number is required"

# 2. Password Match Validation
- tapOn: { id: "PASSWORD_INPUT" }
- inputText: "Pass123!"
- tapOn: { id: "CONFIRM_PASSWORD_INPUT" }
- inputText: "Mismatch1!"
- tapOn: { id: "CREATE_ACCOUNT_BUTTON" }
- assertVisible: "Passwords must match"

# 3. Comprehensive Signup
- tapOn: { id: "FIRST_NAME_INPUT" }
- inputText: "John"
- tapOn: { id: "LAST_NAME_INPUT" }
- inputText: "Doe"
- tapOn: { id: "PHONE_NUMBER_INPUT" }
- inputText: "9876543210"
- tapOn: { id: "PASSWORD_INPUT" }
- eraseText: 10
- inputText: "Password@123"
- tapOn: { id: "CONFIRM_PASSWORD_INPUT" }
- eraseText: 10
- inputText: "Password@123"
- tapOn: { id: "CREATE_ACCOUNT_BUTTON" }
- assertVisible: "Signed in successfully"
