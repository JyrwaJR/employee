tags:
  - auth
  - smoke
  - regression
---
- runFlow: ../setup/launch_app.yaml
- runFlow: ../setup/clear_form.yaml

# Successful Login using Env Variables
- tapOn: { id: "PHONE_INPUT" }
- inputText: ${TEST_PHONE}
- tapOn: { id: "PASSWORD_INPUT" }
- inputText: ${TEST_PASSWORD}

# Ensure form is scrolled before tap
- scrollUntilVisible:
    element: { id: "SIGN_IN_BUTTON" }
    direction: DOWN
- tapOn: { id: "SIGN_IN_BUTTON" }

# 10s delay to allow for profile fetch and AuthRedirect
- assertVisible: "Home"
- killApp:
    appId: ${APP_ID}
