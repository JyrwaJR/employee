tags:
  - auth
  - regression
---
- runFlow: ../setup/launch_app.yaml

# 1. Navigate to Sign Up
- tapOn: { id: "SIGNUP_BUTTON" }

# 2. Empty Fields Validation
- tapOn: { id: "CREATE_ACCOUNT_BUTTON" }
- assertVisible: "First name is required"
- assertVisible: "Last name is required"
- assertVisible: "Phone number is required"
- assertVisible: "Password is required"

# 3. Password Mismatch Validation
- tapOn: { id: "FIRST_NAME_INPUT" }
- inputText: "John"
- tapOn: { id: "LAST_NAME_INPUT" }
- inputText: "Doe"
- tapOn: { id: "PHONE_NUMBER_INPUT" }
- inputText: "1234567890"
- tapOn: { id: "PASSWORD_INPUT" }
- inputText: "Pass123!"
- tapOn: { id: "CONFIRM_PASSWORD_INPUT" }
- inputText: "Mismatch123"
- tapOn: { id: "CREATE_ACCOUNT_BUTTON" }
- assertVisible: "Passwords do not match"
