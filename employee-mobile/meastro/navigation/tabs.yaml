tags:
  - navigation
  - regression
---
- runFlow: ../setup/launch_app.yaml

# 1. Verify Home (Default)
- assertVisible: "Home"

# 2. Navigate to Statements
- tapOn: { id: "TAB_STATEMENT/INDEX" }
- assertVisible: "Statements"

# 3. Navigate to Leaves
- tapOn: { id: "TAB_LEAVE/INDEX" }
- assertVisible: "Leaves"

# 4. Navigate to Pension
- tapOn: { id: "TAB_PENSION/INDEX" }
- assertVisible: "Pension"

# 5. Navigate to Profile (If Admin)
- tapOn: { id: "TAB_PROFILE" }
- assertVisible: "Profile"

# 6. Return to Home
- tapOn: { id: "TAB_HOME" }
- assertVisible: "Home"
